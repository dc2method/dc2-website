name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight UTC

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

      - name: Check for outdated packages
        run: npm outdated || true

      - name: Build project
        run: npm run build

      - name: Check for secrets in code (basic scan)
        run: |
          if git diff origin/main...HEAD | grep -qE "(api[_-]?key|password|secret|token).*['\"]?[a-zA-Z0-9]{20,}"; then
            echo "⚠️ WARNING: Potential secret detected in changes"
            exit 1
          fi
